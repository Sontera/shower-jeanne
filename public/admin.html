<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Shower de Bébé — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-container">
    <h1>Panneau Animateur</h1>
    <p class="admin-subtitle">Contrôle du quiz — Charles</p>
    <div class="phase-badge" id="phase-badge">chargement...</div>

    <!-- Config (lobby) -->
    <div id="panel-config" class="config-panel" style="display:none;">
      <h2>Joueurs</h2>
      <div class="player-list-admin" id="admin-player-list"></div>
      <div style="margin-top:12px;">
        <button class="btn btn-secondary" id="btn-connect-all">Connecter tous les joueurs (test)</button>
      </div>
    </div>

    <!-- Contrôles en jeu -->
    <div class="controls" id="controls">
      <button class="btn btn-primary" id="btn-start">Lancer le quiz</button>
      <button class="btn btn-primary" id="btn-reveal" disabled>Révéler la réponse</button>
      <button class="btn btn-primary" id="btn-scores" disabled>Classement</button>
      <button class="btn btn-primary" id="btn-next" disabled>Question suivante</button>
      <button class="btn btn-secondary" id="btn-back" disabled>Retour</button>
    </div>

    <!-- Outils de test -->
    <div class="controls" id="test-controls" style="margin-top:0;">
      <button class="btn btn-secondary" id="btn-random-votes" disabled>Simuler votes aléatoires</button>
      <button class="btn btn-secondary" id="btn-jeopardy">Jeopardy</button>
    </div>

    <!-- Question en cours -->
    <div class="current-question-info" id="question-info" style="display:none;">
      <h3>Question actuelle</h3>
      <p class="q-text" id="admin-q-text"></p>
      <p class="q-answer" id="admin-q-answer"></p>
    </div>

    <!-- Statut des votes -->
    <div class="vote-status" id="vote-status" style="display:none;">
      <h3>Votes (<span id="vote-count">0</span>/<span id="player-count">0</span>)</h3>
      <div id="vote-list"></div>

      <div style="margin-top:16px;">
        <button class="btn btn-reset" id="btn-reset">Recommencer le quiz</button>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
