<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920">
  <title>Quiz Shower de Bébé — TV</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/tv.css">
</head>
<body>
  <div class="tv-container">

    <!-- LOBBY -->
    <div id="screen-lobby" class="lobby active">
      <div class="lobby-bubble lobby-bubble-left">
        <img src="assets/bebe-fille.png" alt="">
      </div>
      <div class="lobby-bubble lobby-bubble-right">
        <img src="assets/bebe-gars.png" alt="">
      </div>
      <h1>Quiz Shower de Bébé</h1>
      <p class="lobby-subtitle">Scannez le QR code pour rejoindre!</p>
      <div class="lobby-qr" id="qr-code">QR code</div>
      <div class="lobby-players" id="lobby-players"></div>
      <button class="btn-enable-audio" id="btn-enable-audio" onclick="this.style.display='none'; document.getElementById('audio-status').style.display='inline';">Activer le son</button>
      <span id="audio-status" style="display:none; color:var(--correct); font-weight:700; font-size:1.1rem;">Son activé</span>
    </div>

    <!-- ROUND INTRO -->
    <div id="screen-round-intro" class="round-intro-screen">
      <div class="round-intro-image" id="round-image"></div>
      <div class="round-intro-content">
        <p class="round-label" id="round-label">Round 1</p>
        <h2 class="round-theme" id="round-theme"></h2>
        <p class="round-subtitle" id="round-subtitle">5 questions</p>
      </div>
    </div>

    <!-- QUESTION -->
    <div id="screen-question" class="question-screen">
      <div class="players-column" id="players-column"></div>
      <div class="question-content">
        <div class="question-header">
          <span class="question-number" id="q-number"></span>
          <span class="question-theme" id="q-theme"></span>
        </div>
        <p class="question-text" id="q-text"></p>
        <div class="choices" id="q-choices"></div>
        <div class="explanation" id="q-explanation"></div>
      </div>
    </div>

    <!-- SCORES -->
    <div id="screen-scores" class="scores-screen">
      <h2 id="scores-title">Classement</h2>
      <div class="scoreboard" id="scoreboard"></div>
    </div>

    <!-- FINAL -->
    <div id="screen-final" class="final-screen">
      <h2>Podium final</h2>
      <div class="podium" id="podium"></div>
      <div class="scoreboard" id="final-scoreboard"></div>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script type="module" src="js/tv.js"></script>
</body>
</html>
